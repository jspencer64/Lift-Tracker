<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0E1719">
<title>Snatch &amp; Squat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E1719; --panel:#152325; --panel2:#1B2D30; --line:#2A4247;
    --ink:#EAF2F0; --dim:#7E9A9B; --accent:#E8B23A; --accent2:#4FB0A5; --done:#4FB0A5;
    --under:#C97B4A;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:'DM Sans',system-ui,sans-serif;
    padding-bottom:calc(48px + env(safe-area-inset-bottom));min-height:100vh;}
  .disp{font-family:'Barlow Condensed',sans-serif;letter-spacing:.02em;}
  .mono{font-family:'DM Mono',monospace;}
  button{cursor:pointer;border:none;font-family:inherit;color:inherit;background:none;}
  input:focus{outline:2px solid var(--accent);}
  .pill:active{transform:scale(.97);}
  header{padding:calc(18px + env(safe-area-inset-top)) 18px 12px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:var(--bg);z-index:10;}
  .row{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .row::-webkit-scrollbar{display:none;}
  input[type=number]{width:100%;margin-top:4px;background:var(--bg);color:var(--ink);
    border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-size:16px;
    font-family:'DM Mono',monospace;}
  .exwrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    overflow:hidden;transition:border-color .15s;}
  .exhead{display:flex;align-items:center;gap:11px;padding:12px 13px;width:100%;text-align:left;}
  .setrow{display:flex;align-items:center;gap:9px;padding:8px 11px;
    border-top:1px solid var(--line);width:100%;}
  .repbtn{flex-shrink:0;min-width:58px;border-radius:8px;padding:7px 8px;
    border:1px solid var(--line);background:var(--panel2);text-align:center;transition:all .12s;}
  .repbtn:active{transform:scale(.94);}
  .undo{flex-shrink:0;width:26px;height:30px;border-radius:7px;border:1px solid var(--line);
    color:var(--dim);font-size:15px;line-height:1;}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ─── Program data ────────────────────────────────────────────
const MAXES=[
  {key:"snatch",label:"Snatch 1RM"},{key:"clean",label:"Clean & Jerk 1RM"},
  {key:"back",label:"Back Squat 1RM"},{key:"front",label:"Front Squat 1RM"}];
const WEEK_LABELS=["Base volume","Base volume","Build +","Build ++","Intensity peak","Deload & test"];

const ex=(name,lift,reps,ramp,sets,note)=>({name,lift,reps,ramp,sets,note});

const DAYS=[
 {title:"Day 1",subtitle:"Snatch volume + squat",ex:[
   ex("Snatch","snatch",3,[65,68,70,72,72]),
   ex("Snatch Pull","snatch",4,[85,88,90,92]),
   ex("Back Squat","back",4,[68,72,75,77,77]),
   ex("Snatch-grip RDL",null,6,null,3,"By feel"),
   ex("Weighted plank / hollow",null,null,null,3,"Core")]},
 {title:"Day 2",subtitle:"Clean emphasis",ex:[
   ex("Clean & Jerk","clean",2,[65,68,70,73,73]),
   ex("Front Squat","front",3,[73,77,80,82]),
   ex("Clean Pull","clean",4,[85,88,90]),
   ex("Pull-ups",null,8,null,4,"Add load if easy")]},
 {title:"Day 3",subtitle:"Snatch positional",ex:[
   ex("Snatch from blocks (knee)","snatch",3,[66,70,72,74,74]),
   ex("Overhead Squat",null,4,null,4,"Building"),
   ex("Snatch High Pull","snatch",4,[74,77,80,82]),
   ex("Push Press",null,5,null,4,"By feel"),
   ex("Core circuit",null,null,null,3)]},
 {title:"Day 4",subtitle:"Heavy squat + strength",ex:[
   ex("Back Squat","back",3,[70,75,78,80,82],null,"Top set can grind"),
   ex("Back Squat (back-off)","back",5,[70]),
   ex("Snatch Deadlift","snatch",4,[95,100,105]),
   ex("Snatch Balance",null,3,null,5),
   ex("Barbell Row",null,8,null,4)]},
 {title:"Day 5",subtitle:"Full snatch practice",ex:[
   ex("Snatch — top double","snatch",2,null,1,"Work up by feel"),
   ex("Snatch (full)","snatch",3,[72,75,75]),
   ex("Power Snatch",null,2,null,5,"By feel"),
   ex("Front Squat","front",3,[65,68,70]),
   ex("Trunk + upper back",null,null,null,3,"Accessory")]}];

const DELTAS=[0,0,4,5,8,-10];
function adjustPct(b,w){return b==null?null:Math.round(b+DELTAS[w]);}
function volumeNote(w){
  if(w===4)return"Peak week: one fewer rep per set — push load";
  if(w===5)return"Deload ~40%, then test 1RMs at week's end";
  if(w>=2&&w<=3)return"Loads climb; drop one set if bar speed suffers";
  return null;}
function adjustReps(reps,w){
  if(reps==null)return null;
  if(w===4)return Math.max(1,reps-1);
  return reps;}
function roundPlate(kg){return Math.round(kg/2.5)*2.5;}

// ─── Persistent state ────────────────────────────────────────
const KEY="snatchSquatTracker_v3";
let S={maxes:{snatch:"",clean:"",back:"",front:""},unit:"kg",week:0,day:0,reps:{},showSettings:false};
try{const raw=localStorage.getItem(KEY);if(raw)S=Object.assign(S,JSON.parse(raw));}catch(e){}
try{if(!localStorage.getItem(KEY)){
  const old=localStorage.getItem("snatchSquatTracker_v2")||localStorage.getItem("snatchSquatTracker_v1");
  if(old){const o=JSON.parse(old);if(o.maxes)S.maxes=o.maxes;if(o.unit)S.unit=o.unit;}}}catch(e){}
if(!S.reps)S.reps={};
S.showSettings=false;
function save(){try{localStorage.setItem(KEY,JSON.stringify({
  maxes:S.maxes,unit:S.unit,week:S.week,day:S.day,reps:S.reps}));}catch(e){}}

// ─── Helpers ─────────────────────────────────────────────────
const root=document.getElementById("root");
function loadFor(lift,pct){
  if(pct==null||!lift)return null;
  const max=parseFloat(S.maxes[lift]);
  if(!max||isNaN(max))return null;
  const raw=max*pct/100;
  return S.unit==="kg"?roundPlate(raw):Math.round(raw/5)*5;
}
function el(tag,attrs,...kids){
  const n=document.createElement(tag);
  for(const k in attrs||{}){
    if(k==="style")n.style.cssText=attrs[k];
    else if(k==="class")n.className=attrs[k];
    else if(k.startsWith("on"))n.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else n.setAttribute(k,attrs[k]);
  }
  for(const c of kids){if(c==null||c===false)continue;
    n.appendChild(typeof c==="string"?document.createTextNode(c):c);}
  return n;
}
function setCount(e){return e.ramp?e.ramp.length:(e.sets||1);}
function isComplete(key,target){
  const r=S.reps[key];
  if(r==null)return false;
  return target?r>=target:r>0;
}

function render(){
  root.innerHTML="";
  const day=DAYS[S.day];
  const prefix=S.week+"-"+S.day+"-";
  let totalSets=0,doneSets=0,totalReps=0;
  day.ex.forEach((e,i)=>{
    const n=setCount(e),tgt=adjustReps(e.reps,S.week);
    totalSets+=n;
    for(let s=0;s<n;s++){const k=prefix+i+"-"+s;
      if(isComplete(k,tgt))doneSets++;
      totalReps+=(S.reps[k]||0);}
  });
  const pctDone=totalSets?Math.round(doneSets/totalSets*100):0;

  const head=el("header");
  const hrow=el("div",{style:"display:flex;justify-content:space-between;align-items:flex-end;"});
  const ht=el("div");
  ht.appendChild(el("div",{class:"disp",style:"font-size:11px;letter-spacing:.28em;color:var(--accent);text-transform:uppercase;"},"6-Week Block"));
  ht.appendChild(el("div",{class:"disp",style:"font-size:29px;font-weight:700;line-height:1;margin-top:2px;text-transform:uppercase;"},"Snatch & Squat"));
  hrow.appendChild(ht);
  hrow.appendChild(el("button",{class:"pill",style:"background:var(--panel2);color:var(--dim);border-radius:10px;padding:8px 12px;font-size:13px;border:1px solid var(--line);",
    onClick:()=>{S.showSettings=!S.showSettings;render();}},"1RMs"));
  head.appendChild(hrow);
  root.appendChild(head);

  if(S.showSettings){
    const p=el("div",{style:"background:var(--panel);padding:16px 18px;border-bottom:1px solid var(--line);"});
    const top=el("div",{style:"display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"});
    top.appendChild(el("span",{class:"disp",style:"font-size:15px;letter-spacing:.1em;text-transform:uppercase;"},"Your training maxes"));
    const units=el("div",{style:"display:flex;gap:4px;"});
    ["kg","lb"].forEach(u=>{units.appendChild(el("button",{
      style:`background:${S.unit===u?"var(--accent)":"var(--panel2)"};color:${S.unit===u?"#0E1719":"var(--dim)"};font-weight:700;border-radius:8px;padding:5px 11px;font-size:13px;`,
      onClick:()=>{S.unit=u;save();render();}},u));});
    top.appendChild(units);p.appendChild(top);
    const grid=el("div",{style:"display:grid;grid-template-columns:1fr 1fr;gap:10px;"});
    MAXES.forEach(m=>{
      const lab=el("label",{style:"display:block;"});
      lab.appendChild(el("span",{style:"font-size:11px;color:var(--dim);letter-spacing:.05em;"},m.label));
      const inp=el("input",{type:"number",inputmode:"decimal",placeholder:"—"});
      inp.value=S.maxes[m.key];
      inp.addEventListener("input",ev=>{S.maxes[m.key]=ev.target.value;save();refreshLoadsInPlace();});
      lab.appendChild(inp);grid.appendChild(lab);
    });
    p.appendChild(grid);
    p.appendChild(el("p",{style:"font-size:11.5px;color:var(--dim);margin-top:12px;line-height:1.5;"},
      "Every set's weight is calculated from these and ramps within the session. Pulls and deadlifts reference your snatch or clean max."));
    root.appendChild(p);
  }

  const wrow=el("div",{class:"row",style:"padding:14px 18px 6px;"});
  WEEK_LABELS.forEach((wl,i)=>{
    const b=el("button",{class:"pill",style:`flex:0 0 auto;background:${S.week===i?"var(--accent)":"var(--panel)"};color:${S.week===i?"#0E1719":"var(--ink)"};border-radius:10px;padding:8px 13px;text-align:left;min-width:76px;border:1px solid ${S.week===i?"var(--accent)":"var(--line)"};`,
      onClick:()=>{S.week=i;save();render();}});
    b.appendChild(el("div",{class:"disp",style:"font-size:17px;font-weight:700;line-height:1;"},"WK "+(i+1)));
    b.appendChild(el("div",{style:"font-size:9.5px;opacity:.85;margin-top:2px;"},wl));
    wrow.appendChild(b);
  });
  root.appendChild(wrow);

  const drow=el("div",{class:"row",style:"padding:8px 18px 4px;"});
  DAYS.forEach((d,i)=>{
    drow.appendChild(el("button",{class:"pill",style:`flex:0 0 auto;background:${S.day===i?"var(--panel2)":"transparent"};color:${S.day===i?"var(--ink)":"var(--dim)"};border-radius:8px;padding:6px 13px;font-size:14px;font-weight:700;border:1px solid ${S.day===i?"var(--accent2)":"var(--line)"};`,
      onClick:()=>{S.day=i;save();render();}},d.title.replace("Day ","D")));
  });
  root.appendChild(drow);

  const pw=el("div",{style:"padding:10px 18px 4px;"});
  const pr=el("div",{style:"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;"});
  pr.appendChild(el("span",{class:"disp",style:"font-size:20px;font-weight:700;text-transform:uppercase;"},day.subtitle));
  pr.appendChild(el("span",{class:"mono",style:"font-size:12px;color:var(--dim);"},
    doneSets+"/"+totalSets+" sets · "+totalReps+" reps"));
  pw.appendChild(pr);
  const track=el("div",{style:"height:4px;background:var(--panel);border-radius:4px;overflow:hidden;"});
  track.appendChild(el("div",{style:`height:100%;width:${pctDone}%;background:var(--done);transition:width .3s;`}));
  pw.appendChild(track);root.appendChild(pw);

  const vn=volumeNote(S.week);
  if(vn)root.appendChild(el("div",{style:"margin:10px 18px 0;padding:9px 12px;background:var(--panel2);border-left:3px solid var(--accent);border-radius:6px;font-size:12.5px;line-height:1.4;"},vn));

  const list=el("div",{style:"padding:12px 18px 0;display:flex;flex-direction:column;gap:10px;"});
  day.ex.forEach((e,i)=>{
    const n=setCount(e);
    const tgt=adjustReps(e.reps,S.week);
    let exDone=0;
    for(let s=0;s<n;s++)if(isComplete(prefix+i+"-"+s,tgt))exDone++;
    const allDone=exDone===n;
    const wrap=el("div",{class:"exwrap",style:`border-color:${allDone?"var(--done)":"var(--line)"};`});

    const hd=el("div",{class:"exhead"});
    const mid=el("div",{style:"flex:1;min-width:0;"});
    mid.appendChild(el("div",{style:`font-size:15.5px;font-weight:700;opacity:${allDone?.6:1};`},e.name));
    const sub=n+" set"+(n>1?"s":"")+(tgt?" × "+tgt:"")+(e.note?" · "+e.note:"");
    mid.appendChild(el("div",{style:"font-size:12px;color:var(--dim);margin-top:2px;"},sub));
    hd.appendChild(mid);
    hd.appendChild(el("div",{class:"mono",style:`font-size:12px;color:${allDone?"var(--done)":"var(--dim)"};flex-shrink:0;`},exDone+"/"+n));
    wrap.appendChild(hd);

    for(let s=0;s<n;s++){
      const k=prefix+i+"-"+s;
      const logged=S.reps[k];
      const done=isComplete(k,tgt);
      const started=logged!=null&&logged>0;
      const short=started&&tgt&&logged<tgt;
      const pct=e.ramp?adjustPct(e.ramp[s],S.week):null;
      const w=loadFor(e.lift,pct);

      const row=el("div",{class:"setrow",style:`background:${done?"var(--panel2)":"transparent"};`});
      row.appendChild(el("span",{class:"mono",style:"font-size:10.5px;color:var(--dim);width:26px;flex-shrink:0;"},"S"+(s+1)));

      const repBtn=el("button",{class:"repbtn",
        style:`border-color:${done?"var(--done)":(short?"var(--under)":"var(--line)")};`,
        onClick:()=>{
          const cur=S.reps[k]||0;
          const ceiling=(tgt||12)+2;
          const next=cur>=ceiling?0:cur+1;
          if(next===0)delete S.reps[k];else S.reps[k]=next;
          save();render();
          if(navigator.vibrate)navigator.vibrate(8);
        }});
      const repLine=el("div",{style:"display:flex;align-items:baseline;justify-content:center;gap:2px;"});
      repLine.appendChild(el("span",{class:"mono",
        style:`font-size:16px;font-weight:500;line-height:1;color:${done?"var(--done)":(short?"var(--under)":"var(--ink)")};`},
        String(logged||0)));
      if(tgt)repLine.appendChild(el("span",{class:"mono",style:"font-size:11px;color:var(--dim);line-height:1;"},"/"+tgt));
      repBtn.appendChild(repLine);
      repBtn.appendChild(el("div",{style:"font-size:8.5px;color:var(--dim);letter-spacing:.08em;margin-top:2px;text-transform:uppercase;"},"reps"));
      row.appendChild(repBtn);

      if(started){
        row.appendChild(el("button",{class:"undo",
          onClick:()=>{const cur=S.reps[k]||0;
            if(cur<=1)delete S.reps[k];else S.reps[k]=cur-1;
            save();render();}},"−"));
      }else{
        row.appendChild(el("span",{style:"width:26px;flex-shrink:0;"}));
      }

      const loadCell=el("div",{style:"flex:1;display:flex;align-items:baseline;gap:6px;justify-content:flex-end;"});
      if(w!=null){
        const v=el("span",{class:"mono","data-w":k,style:`font-size:17px;font-weight:500;color:${done?"var(--dim)":"var(--accent)"};`});
        v.appendChild(document.createTextNode(w+" "));
        v.appendChild(el("span",{style:"font-size:10.5px;color:var(--dim);"},S.unit));
        loadCell.appendChild(v);
        loadCell.appendChild(el("span",{class:"mono",style:"font-size:10.5px;color:var(--dim);width:30px;text-align:right;"},pct+"%"));
      }else{
        loadCell.appendChild(el("span",{class:"mono","data-w":k,style:"font-size:12px;color:var(--dim);"},
          e.lift&&!S.maxes[e.lift]?"set 1RM":(e.ramp?"—":"by feel")));
        loadCell.appendChild(el("span",{style:"width:30px;"}));
      }
      row.appendChild(loadCell);
      wrap.appendChild(row);
    }
    list.appendChild(wrap);
  });
  root.appendChild(list);

  const foot=el("div",{style:"padding:18px 18px 0;"});
  foot.appendChild(el("button",{style:"width:100%;background:var(--panel);border:1px solid var(--line);color:var(--dim);border-radius:10px;padding:11px;font-size:13px;",
    onClick:()=>{if(confirm("Clear all logged reps for Week "+(S.week+1)+"?")){
      Object.keys(S.reps).forEach(k=>{if(k.indexOf(S.week+"-")===0)delete S.reps[k];});
      save();render();}}},"Clear week "+(S.week+1)+" progress"));
  foot.appendChild(el("div",{style:"font-size:11px;color:var(--dim);line-height:1.6;margin-top:14px;"},
    "Tap the rep box to count up; − steps back. Amber means you came in under target — a signal, not a failure. Ascending sets are targets: if bar speed drops on the Olympic lifts, repeat the previous load rather than climbing."));
  root.appendChild(foot);
}

// Update only weight text, leaving inputs (and keyboard focus) alone
function refreshLoadsInPlace(){
  const day=DAYS[S.day];
  const prefix=S.week+"-"+S.day+"-";
  day.ex.forEach((e,i)=>{
    const n=setCount(e);
    for(let s=0;s<n;s++){
      const k=prefix+i+"-"+s;
      const node=document.querySelector('[data-w="'+k+'"]');
      if(!node)continue;
      const pct=e.ramp?adjustPct(e.ramp[s],S.week):null;
      const w=loadFor(e.lift,pct);
      node.innerHTML="";
      if(w!=null){
        node.style.fontSize="17px";node.style.color="var(--accent)";
        node.appendChild(document.createTextNode(w+" "));
        node.appendChild(el("span",{style:"font-size:10.5px;color:var(--dim);"},S.unit));
      }else{
        node.style.fontSize="12px";node.style.color="var(--dim)";
        node.appendChild(document.createTextNode(
          e.lift&&!S.maxes[e.lift]?"set 1RM":(e.ramp?"—":"by feel")));
      }
    }
  });
}
render();
</script>
</body>
</html>
